<!DOCTYPE html>
<html>
<head>
<title>App Icon 512x512</title>
<style>
  body { margin: 0; background: #333; display: flex; align-items: center; justify-content: center; height: 100vh; }
  .icon { width: 512px; height: 512px; }
</style>
</head>
<body>
<div class="icon">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect x="18" y="18" width="92" height="92" rx="18" fill="#fff"/>
  <text x="64" y="88" text-anchor="middle" font-size="72" font-weight="900" font-family="Arial, sans-serif" fill="#1a1a1a">火</text>
</svg>
</div>
<p style="color:#999;margin-top:20px;position:fixed;bottom:10px;">Right-click the image → Save as PNG (512x512)</p>
</body>
</html>
