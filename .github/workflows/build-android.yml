name: Build Android App

on:
  workflow_dispatch:  # Manual trigger only — run when ready to build

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web app (native mode)
        run: NATIVE_BUILD=1 npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android AAB
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: VolcanoFrog-android-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
