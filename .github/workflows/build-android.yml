name: Build Android App

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web app (native mode)
        run: NATIVE_BUILD=1 npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias volcanofrog \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD || 'VolcanoFrog2026' }} \
            -keypass ${{ secrets.KEYSTORE_PASSWORD || 'VolcanoFrog2026' }} \
            -dname "CN=Volcano Frog, OU=Apps, O=Formula 8 Consulting, L=Sydney, ST=NSW, C=AU"

      - name: Configure signing
        run: |
          cat >> android/app/build.gradle << 'SIGNING'

          android {
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword System.getenv("KEYSTORE_PASSWORD") ?: "VolcanoFrog2026"
                      keyAlias "volcanofrog"
                      keyPassword System.getenv("KEYSTORE_PASSWORD") ?: "VolcanoFrog2026"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          SIGNING

      - name: Build Android AAB and APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: VolcanoFrog-android-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VolcanoFrog-android-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
